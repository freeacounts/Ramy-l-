<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رمز الدخول</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* مربع الرمز */
.key-box{
  width:280px;
  max-width:90%;
  background:rgba(17,24,39,0.9);
  padding:30px 20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 15px #FFA500; /* ضوء برتقالي */
  transition: all 0.3s ease;
  position:relative;
}
.key-box.green{
  animation:greenGlow 1s infinite alternate;
}
@keyframes greenGlow{
  0%{box-shadow:0 0 15px #22c55e;}
  50%{box-shadow:0 0 30px #22c55e;}
  100%{box-shadow:0 0 50px #22c55e;}
}
.key-box.red{
  box-shadow:0 0 25px #ff5555,0 0 50px #ff5555AA,0 0 75px #ff5555;
  border:2px solid #ff5555;
  animation:shake 0.3s;
}
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}
.key-box input{
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  width:80%;
  margin-bottom:15px;
  text-align:center;
  font-size:16px;
}
.key-box input:focus{
  box-shadow:0 0 15px #FFA500;
}
.key-box button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}
.error-msg{
  color:#ff5555;
  margin-top:10px;
  display:none;
}

/* مربع رامي تحبني */
.ramy-box{
  width:300px;
  max-width:90%;
  background:rgba(17,24,39,0.9);
  padding:30px 20px;
  border-radius:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:white;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
  border:6px solid;
  animation:rainbowBorder 3s linear infinite;
}
@keyframes rainbowBorder{
  0%{border-color:red;}
  14%{border-color:orange;}
  28%{border-color:yellow;}
  42%{border-color:green;}
  57%{border-color:blue;}
  71%{border-color:indigo;}
  85%{border-color:violet;}
  100%{border-color:red;}
}

/* العدّاد الدائري */
.countdown{
  position:absolute;
  bottom:10px;
  left:10px;
  width:40px;
  height:40px;
  border-radius:50%;
  border:3px solid #22c55e;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:white;
  font-size:18px;
  display:none;
  animation:glow 1s infinite alternate;
}
@keyframes glow{
  0%{box-shadow:0 0 5px #22c55e;}
  100%{box-shadow:0 0 15px #22c55e;}
}

/* أزرار نعم و لا */
.choice-btns{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}
.choice-btns button{
  width:80px;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  font-size:16px;
}
.yes-btn{background:#22c55e;}
.no-btn{background:#ff5555;}

/* مؤثرات */
.firework, .sad-effect{
  position:absolute;
  top:0; left:0; width:100%; height:100%; pointer-events:none;
}
.firework span{
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  background:yellow;
  animation:fire 1s linear infinite;
}
@keyframes fire{
  0%{opacity:1; transform:translate(0,0);}
  100%{opacity:0; transform:translate(0,-300px) rotate(720deg);}
}
.sad-effect span{
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  background:blue;
  animation:sad 1s linear infinite;
}
@keyframes sad{
  0%{opacity:1; transform:translate(0,0);}
  100%{opacity:0; transform:translate(0,300px) rotate(360deg);}
}

@media(max-width:768px){
  .key-box,.ramy-box{width:90%;}
  .choice-btns button{width:40%; font-size:14px;}
}
</style>
</head>
<body>

<div class="key-box" id="keyBox">
  <h2>أدخل الرمز</h2>
  <input type="password" id="keyInput" placeholder="أدخل الرمز">
  <br>
  <button onclick="checkKey()">دخول</button>
  <div class="error-msg" id="errorMsg">رمز خاطئ!</div>
  <div class="countdown" id="countdownKey">3</div>
</div>

<div class="ramy-box" id="ramyBox">
  رامي تحبني
  <div class="countdown" id="countdownRamy">3</div>
  <div class="choice-btns">
    <button class="yes-btn" onclick="showHappy()">نعم</button>
    <button class="no-btn" onclick="showSad()">لا</button>
  </div>
</div>

<div class="firework" id="firework"></div>
<div class="sad-effect" id="sadEffect"></div>

<script>
const correctKey = "ramy";
const keyBox = document.getElementById("keyBox");
const errorMsg = document.getElementById("errorMsg");
const ramyBox = document.getElementById("ramyBox");
const countdownKey = document.getElementById("countdownKey");
const countdownRamy = document.getElementById("countdownRamy");
const firework = document.getElementById("firework");
const sadEffect = document.getElementById("sadEffect");

function checkKey(){
  const input = document.getElementById("keyInput").value;
  if(input.toLowerCase() === correctKey){
    errorMsg.style.display="none";
    keyBox.classList.add("green");

    // العدّاد داخل مربع الرمز
    countdownKey.style.display="flex";
    let count = 3;
    countdownKey.innerText = count;

    let interval = setInterval(()=>{
      count--;
      if(count>0){
        countdownKey.innerText=count;
      }else{
        clearInterval(interval);
        countdownKey.style.display="none";
        keyBox.style.display="none";

        // ظهور مربع رامي
        ramyBox.style.display="block";
        countdownRamy.style.display="flex";

        let rCount = 3;
        countdownRamy.innerText = rCount;
        let rInterval = setInterval(()=>{
          rCount--;
          countdownRamy.innerText = rCount;
          if(rCount===0){
            clearInterval(rInterval);
            countdownRamy.style.display="none";
          }
        },1000);
      }
    },1000);
  }else{
    errorMsg.style.display="block";
    keyBox.classList.add("red");
    setTimeout(()=>{ keyBox.classList.remove("red"); },500);
  }
}

// مؤثرات نعم / لا
function showHappy(){
  firework.innerHTML = '';
  for(let i=0;i<30;i++){
    let span = document.createElement('span');
    span.style.left = Math.random()*100 + '%';
    span.style.top = Math.random()*100 + '%';
    firework.appendChild(span);
  }
  firework.style.display='block';
  setTimeout(()=>{ firework.style.display='none'; },3000);
}

function showSad(){
  sadEffect.innerHTML='';
  for(let i=0;i<30;i++){
    let span = document.createElement('span');
    span.style.left = Math.random()*100 + '%';
    span.style.top = Math.random()*100 + '%';
    sadEffect.appendChild(span);
  }
  sadEffect.style.display='block';
  setTimeout(()=>{ sadEffect.style.display='none'; },3000);
}
</script>

</body>
</html>
